<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Primary Meta -->
    <title>Grievance Grid</title>
    <meta name="description" content="Submit and track grievances with Grievance Grid." />
    <meta name="author" content="Your Name" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourapp.com/" />
    <meta property="og:title" content="My App" />
    <meta property="og:description" content="A fast, modern web application built with React." />
    <meta property="og:image" content="%PUBLIC_URL%/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="My App" />
    <meta name="twitter:description" content="A fast, modern web application built with React." />
    <meta name="twitter:image" content="%PUBLIC_URL%/og-image.png" />

    <!-- Icons & PWA -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" sizes="any" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Security -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
  </head>
  <body>
    <noscript>
      <p style="font-family: sans-serif; text-align: center; padding: 2rem;">
        JavaScript is required to run this app. Please enable it in your browser settings.
      </p>
    </noscript>

    <div id="root"></div>

    <!--
      React App Entry Point
      ─────────────────────
      • Development : npm start  /  yarn start
      • Production  : npm run build  /  yarn build
      • Testing     : npm test  /  yarn test
    -->
  </body>
</html>
